<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soraya Perfumes y Cosméticos</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#b8860b;--gold-light:#d4a843;--cream:#faf7f2;--dark:#1a1410;--mid:#3d3530;--rose:#c9a0a0;--rose-light:#f5ece8;--border:#e8ddd5;--white:#ffffff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--dark);overflow-x:hidden;}
.topbar{background:var(--dark);color:var(--gold-light);text-align:center;padding:8px 20px;font-size:12px;letter-spacing:2px;font-weight:500;text-transform:uppercase;}
header{background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1000;box-shadow:0 2px 20px rgba(0,0,0,0.06);}
.header-inner{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:18px 30px;}
.header-left{display:flex;align-items:center;gap:20px;}
.header-right{display:flex;align-items:center;justify-content:flex-end;gap:18px;}
.logo{text-align:center;cursor:pointer;}
.logo-main{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;letter-spacing:3px;color:var(--dark);text-transform:uppercase;line-height:1.1;}
.logo-sub{font-size:10px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;font-weight:500;}
.header-icon{cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;letter-spacing:1px;color:var(--mid);text-decoration:none;transition:color 0.2s;text-transform:uppercase;font-weight:500;background:none;border:none;font-family:inherit;}
.header-icon:hover{color:var(--gold);}
.header-icon svg{width:20px;height:20px;}
.cart-badge{background:var(--gold);color:white;border-radius:50%;width:18px;height:18px;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:600;margin-left:-8px;margin-top:-8px;}
.cart-wrap{position:relative;display:flex;}
nav{background:var(--dark);}
.nav-inner{max-width:1400px;margin:0 auto;display:flex;justify-content:center;padding:0 30px;flex-wrap:wrap;}
.nav-item{position:relative;}
.nav-link{color:rgba(255,255,255,0.85);font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:500;padding:14px 18px;display:block;cursor:pointer;transition:color 0.2s;white-space:nowrap;}
.nav-link:hover{color:var(--gold-light);}
.dropdown{display:none;position:absolute;top:100%;left:0;background:var(--white);min-width:220px;border:1px solid var(--border);box-shadow:0 8px 30px rgba(0,0,0,0.12);z-index:999;}
.nav-item:hover .dropdown{display:block;}
.dropdown a{display:block;padding:10px 20px;font-size:13px;color:var(--mid);text-decoration:none;border-bottom:1px solid var(--border);transition:background 0.2s,color 0.2s;cursor:pointer;}
.dropdown a:last-child{border-bottom:none;}
.dropdown a:hover{background:var(--rose-light);color:var(--gold);}
.page{display:none;}.page.active{display:block;}
.hero{background:linear-gradient(135deg,var(--dark) 0%,#2d2015 50%,#1a0f0a 100%);min-height:500px;display:flex;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 60% 50%,rgba(184,134,11,0.15) 0%,transparent 70%);}
.hero-deco{position:absolute;border-radius:50%;border:1px solid rgba(184,134,11,0.12);top:50%;left:50%;transform:translate(-50%,-50%);}
.hero-content{position:relative;z-index:2;padding:60px 20px;}
.hero-eyebrow{font-size:11px;letter-spacing:5px;color:var(--gold-light);text-transform:uppercase;font-weight:500;margin-bottom:20px;}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,8vw,80px);font-weight:300;color:var(--white);line-height:1.1;margin-bottom:20px;letter-spacing:2px;}
.hero-title em{font-style:italic;color:var(--gold-light);}
.hero-desc{font-size:15px;color:rgba(255,255,255,0.6);max-width:500px;margin:0 auto 36px;line-height:1.8;}
.btn-hero{display:inline-block;padding:14px 40px;border:1px solid var(--gold-light);color:var(--gold-light);font-size:11px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all 0.3s;font-weight:500;margin:6px;font-family:inherit;background:transparent;}
.btn-hero:hover,.btn-hero.filled{background:var(--gold);border-color:var(--gold);color:var(--dark);}
.features-bar{background:var(--white);border-bottom:1px solid var(--border);padding:28px 30px;}
.features-grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:20px;}
.feature{display:flex;align-items:center;gap:14px;}
.feature-icon{width:44px;height:44px;background:var(--rose-light);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;}
.feature-text h4{font-size:13px;font-weight:600;}
.feature-text p{font-size:12px;color:#888;}
.section{padding:60px 30px;}.section-alt{background:var(--white);}
.section-header{text-align:center;margin-bottom:48px;}
.section-eyebrow{font-size:11px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;font-weight:500;margin-bottom:12px;}
.section-title{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:400;color:var(--dark);letter-spacing:1px;}
.section-line{width:50px;height:1px;background:var(--gold);margin:16px auto 0;}
.categories-grid{max-width:1300px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:20px;}
.cat-card{background:var(--dark);aspect-ratio:3/4;position:relative;overflow:hidden;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:20px;transition:transform 0.3s;}
.cat-card:hover{transform:translateY(-4px);}
.cat-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:80px;opacity:0.15;}
.cat-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(26,20,16,0.9) 0%,transparent 60%);}
.cat-label{position:relative;z-index:2;text-align:center;}
.cat-label h3{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--white);font-weight:400;letter-spacing:1px;margin-bottom:4px;}
.cat-label span{font-size:10px;color:var(--gold-light);letter-spacing:2px;text-transform:uppercase;}
.products-grid{max-width:1300px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:24px;}
.product-card{background:var(--white);border:1px solid var(--border);cursor:pointer;transition:box-shadow 0.3s,transform 0.3s;position:relative;overflow:hidden;}
.product-card:hover{box-shadow:0 12px 40px rgba(0,0,0,0.1);transform:translateY(-4px);}
.product-img{height:320px;background:var(--rose-light);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.product-img img{width:100%;height:100%;object-fit:contain;padding:8px;transition:transform 0.4s;}
.product-card:hover .product-img img{transform:scale(1.04);}
.product-badge{position:absolute;top:12px;left:12px;background:var(--gold);color:var(--dark);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;z-index:2;}
.product-actions{position:absolute;bottom:-55px;left:0;right:0;display:flex;gap:8px;padding:10px;transition:bottom 0.3s;z-index:3;}
.product-card:hover .product-actions{bottom:0;}
.btn-add-cart{flex:1;background:var(--dark);color:var(--white);border:none;padding:11px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:'Jost',sans-serif;font-weight:500;transition:background 0.2s;}
.btn-add-cart:hover{background:var(--gold);color:var(--dark);}
.btn-wishlist{width:42px;background:var(--white);border:1px solid var(--border);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.product-info{padding:16px;border-top:1px solid var(--border);}
.product-info .cat-tag{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#aaa;margin-bottom:6px;}
.product-info h3{font-size:14px;font-weight:500;margin-bottom:6px;}
.product-info .price{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold);font-weight:600;}
.product-info .price-old{font-size:14px;color:#aaa;text-decoration:line-through;margin-left:6px;}
.product-info .stars{font-size:11px;color:var(--gold-light);margin-top:4px;}
.filter-tabs{display:flex;gap:8px;flex-wrap:wrap;max-width:1300px;margin:0 auto 32px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.filter-tab{padding:8px 18px;border:1px solid var(--border);background:var(--white);cursor:pointer;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;color:var(--mid);transition:all 0.2s;font-family:inherit;}
.filter-tab.active,.filter-tab:hover{background:var(--dark);color:var(--white);border-color:var(--dark);}
.banner{background:linear-gradient(135deg,var(--dark),#2d2015);padding:70px 30px;text-align:center;position:relative;overflow:hidden;}
.banner-content{position:relative;z-index:2;}
.banner h2{font-family:'Cormorant Garamond',serif;font-size:48px;color:var(--white);font-weight:300;margin-bottom:16px;letter-spacing:2px;}
.banner h2 em{font-style:italic;color:var(--gold-light);}
.banner p{color:rgba(255,255,255,0.6);font-size:15px;max-width:500px;margin:0 auto 30px;line-height:1.8;}
.newsletter{background:var(--rose-light);padding:60px 30px;text-align:center;}
.newsletter h2{font-family:'Cormorant Garamond',serif;font-size:34px;margin-bottom:10px;}
.newsletter p{color:#888;font-size:14px;margin-bottom:28px;}
.newsletter-form{display:flex;max-width:500px;margin:0 auto 16px;}
.newsletter-form input{flex:1;padding:14px 20px;border:1px solid var(--border);border-right:none;font-family:'Jost',sans-serif;font-size:14px;outline:none;background:var(--white);}
.newsletter-form button{padding:14px 28px;background:var(--dark);color:var(--white);border:none;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;}
footer{background:var(--dark);color:rgba(255,255,255,0.7);padding:60px 30px 30px;}
.footer-grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;padding-bottom:40px;border-bottom:1px solid rgba(255,255,255,0.1);margin-bottom:30px;}
.footer-brand .logo-main{font-size:22px;color:var(--white);margin-bottom:8px;}
.footer-brand .logo-sub{color:var(--gold-light);}
.footer-brand p{font-size:13px;margin-top:16px;line-height:1.8;color:rgba(255,255,255,0.5);}
.footer-social{display:flex;gap:12px;margin-top:20px;}
.social-btn{width:36px;height:36px;border:1px solid rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:rgba(255,255,255,0.6);font-weight:600;}
.social-btn:hover{border-color:var(--gold-light);color:var(--gold-light);}
.footer-col h4{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-light);margin-bottom:20px;font-weight:600;}
.footer-col a{display:block;font-size:13px;color:rgba(255,255,255,0.5);text-decoration:none;margin-bottom:10px;cursor:pointer;transition:color 0.2s;}
.footer-col a:hover{color:var(--white);}
.footer-bottom{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:rgba(255,255,255,0.3);flex-wrap:wrap;gap:10px;}
.pay-icon{background:rgba(255,255,255,0.1);padding:4px 10px;border-radius:3px;font-size:10px;color:rgba(255,255,255,0.6);}
.cart-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9998;}
.cart-overlay.open{display:block;}
.cart-sidebar{position:fixed;top:0;right:-100%;width:420px;max-width:100vw;height:100vh;background:var(--white);z-index:9999;transition:right 0.35s;display:flex;flex-direction:column;box-shadow:-10px 0 40px rgba(0,0,0,0.15);}
.cart-sidebar.open{right:0;}
.cart-header{padding:24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.cart-header h3{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;}
.cart-close{cursor:pointer;font-size:22px;color:var(--mid);background:none;border:none;}
.cart-body{flex:1;overflow-y:auto;padding:20px 24px;}
.cart-empty{text-align:center;padding:60px 20px;color:#aaa;}
.cart-item{display:flex;gap:14px;padding:16px 0;border-bottom:1px solid var(--border);}
.cart-item-img{width:70px;height:90px;background:var(--rose-light);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.cart-item-img img{width:100%;height:100%;object-fit:contain;padding:4px;}
.cart-item-details{flex:1;}
.cart-item-details h4{font-size:13px;font-weight:500;margin-bottom:6px;}
.cart-item-details .price{color:var(--gold);font-weight:600;}
.cart-qty{display:flex;align-items:center;gap:10px;margin-top:10px;}
.qty-btn{width:28px;height:28px;border:1px solid var(--border);background:var(--white);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.qty-num{font-size:13px;font-weight:600;min-width:24px;text-align:center;}
.cart-item-remove{cursor:pointer;color:#ccc;font-size:18px;background:none;border:none;align-self:flex-start;}
.cart-footer{padding:20px 24px;border-top:1px solid var(--border);}
.cart-total{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.cart-total span{font-size:13px;color:#888;}
.cart-total strong{font-family:'Cormorant Garamond',serif;font-size:24px;}
.cart-pay-info{background:var(--rose-light);padding:12px 16px;margin-bottom:14px;font-size:12px;color:var(--mid);line-height:1.7;border-left:3px solid var(--gold);}
.btn-checkout{width:100%;padding:16px;background:var(--dark);color:var(--white);border:none;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;font-weight:600;}
.btn-checkout:hover{background:var(--gold);color:var(--dark);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:10000;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);max-width:700px;width:100%;display:grid;grid-template-columns:1fr 1fr;max-height:90vh;overflow:hidden;}
.modal-img{background:var(--rose-light);display:flex;align-items:center;justify-content:center;min-height:350px;}
.modal-img img{width:100%;height:100%;object-fit:contain;padding:16px;}
.modal-info{padding:36px;overflow-y:auto;}
.modal-info h2{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;margin-bottom:8px;}
.modal-price{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--gold);font-weight:600;margin-bottom:16px;}
.modal-info p{font-size:14px;color:#888;line-height:1.8;margin-bottom:20px;}
.modal-close{position:fixed;top:20px;right:20px;background:var(--dark);color:var(--white);border:none;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;z-index:10001;}
.size-btn{padding:6px 14px;border:1px solid var(--border);cursor:pointer;font-size:13px;background:var(--white);transition:all 0.2s;font-family:inherit;margin-right:6px;margin-bottom:6px;}
.size-btn.active{border-color:var(--dark);background:var(--dark);color:var(--white);}
.btn-modal{width:100%;padding:14px;background:var(--dark);color:var(--white);border:none;font-family:'Jost',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-weight:600;margin-top:8px;}
.btn-modal:hover{background:var(--gold);color:var(--dark);}
.modal-pay{background:var(--rose-light);padding:12px;margin-top:14px;font-size:12px;color:var(--mid);line-height:1.7;border-left:3px solid var(--gold);}

<script>

// RENDERIZADO TIENDA E INICIO
function renderGrid(containerId, catFilter, limit){
  var c = document.getElementById(containerId);
  if(!c) return;
  c.innerHTML = "";
  var f = catFilter ? products.filter(p=>p.cat===catFilter) : products;
  if(limit) f = f.slice(0,limit);
  f.forEach(p=>{
    var d = document.createElement('div');
    d.className = 'product-card';
    d.innerHTML = `
      <div class="product-img" onclick="openProduct(${p.id})">
        ${p.badge?`<span class="product-badge">${p.badge}</span>`:''}
        <img src="${p.img}" alt="${p.title}">
        <div class="product-actions">
          <button class="btn-add-cart" onclick="event.stopPropagation();addToCart(${p.id})">Añadir al Carro</button>
        </div>
      </div>
      <div class="product-info" onclick="openProduct(${p.id})">
        <div class="cat-tag">${p.cat.replace('-',' ')}</div>
        <h3>${p.title}</h3>
        <div class="price">${p.price.toFixed(2)}€ ${p.oldPrice?`<span class="price-old">${p.oldPrice.toFixed(2)}€</span>`:''}</div>
        <div class="stars">★★★★★</div>
      </div>
    `;
    c.appendChild(d);
  });
}
function renderShop(cat){
  var title = "Todos los Productos";
  if(cat) title = cat.replace('-',' ').toUpperCase();
  document.getElementById('shopTitle').textContent = title;
  renderGrid('shopGrid',cat,null);
}

  box.innerHTML = "";
  products.forEach(p=>{
    var r = document.createElement('div');
    r.className = 'admin-prod-row';

function createNewProduct(){
  var title = document.getElementById('npTitle').value;
  var cat = document.getElementById('npCat').value;
  var price = parseFloat(document.getElementById('npPrice').value);
  var oldPrice = parseFloat(document.getElementById('npOld').value) || null;
  var img = document.getElementById('npImg').value || "https://images.unsplash.com/photo-1541643600914-78b084683601?auto=format&fit=crop&w=500&q=80";
  var badge = document.getElementById('npBadge').value || null;
  var size = document.getElementById('npSize').value || "100ml";
  var desc = document.getElementById('npDesc').value || "";

  if(!title || isNaN(price)){ alert("Introduce título y precio correctos"); return; }
  
  var newId = products.length > 0 ? Math.max(...products.map(p=>p.id)) + 1 : 1;
  products.push({id:newId, title:title, cat:cat, price:price, oldPrice:oldPrice, img:img, badge:badge, size:size, desc:desc});
  
  saveProds();
  alert("¡Producto añadido con éxito!");
  
  // Limpieza
  document.getElementById('npTitle').value="";
  document.getElementById('npPrice').value="";
  document.getElementById('npOld').value="";
  document.getElementById('npImg').value="";
  document.getElementById('npBadge').value="";
  document.getElementById('npSize').value="";
  document.getElementById('npDesc').value="";
  
  switchAdminTab('prods');
  renderGrid('homeGrid',null,8);
}

function deleteProduct(id){
  if(confirm("¿Seguro que deseas eliminar este producto?")){
    products = products.filter(p=>p.id !== id);
    saveProds();
    renderAdminProducts();
    renderGrid('homeGrid',null,8);
  }
}

// COPIA DE SEGURIDAD PERMANENTE EN HTML
function downloadBackupHTML(){
  setTimeout(function(){
    try {
      var currentHTML = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
      var blob = new Blob([currentHTML], {type: 'text/html;charset=utf-8'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'sorayaperfumesycosmeticos.html';
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 3000);
      showToast('✓ Descargada con '+ products.length +' productos y fotos');
    } catch(err) {
      alert('Error al descargar: ' + err.message);
    }
  }, 300);
}

function closeCart(){ document.getElementById('cartOverlay').classList.remove('open'); document.getElementById('cartSidebar').classList.remove('open'); }

function addToCart(id){
  var p = products.find(prod=>prod.id===id);
  if(!p) return;
  var item = cart.find(c=>c.product.id===id);
  if(item) { item.qty++; } else { cart.push({product:p, qty:1}); }
  updateBadge();
  showToast('✓ Añadido al carro: ' + p.title);
}
function updateBadge(){
  var total = cart.reduce((acc,item)=>acc+item.qty, 0);
  document.getElementById('cartBadge').textContent = total;
}
function updateQty(id, delta){
  var item = cart.find(c=>c.product.id===id);
  if(!item) return;
  item.qty += delta;
  if(item.qty <= 0) { cart = cart.filter(c=>c.product.id!==id); }
  updateBadge();
  renderCart();
}
function removeFromCart(id){
  cart = cart.filter(c=>c.product.id!==id);
  updateBadge();
  renderCart();
}
function renderCart(){
  var body = document.getElementById('cartBody');
  body.innerHTML = "";
  if(cart.length === 0){
    body.innerHTML = `<div class="cart-empty">Tu carro está vacío.<br><br><button class="btn-outline" onclick="closeCart()">Volver a la Tienda</button></div>`;
    document.getElementById('cartTotal').textContent = "0.00€";
    return;
  }
  var total = 0;
  cart.forEach(item=>{
    var sub = item.product.price * item.qty;
    total += sub;
    var d = document.createElement('div');
    d.className = "cart-item";
    d.innerHTML = `
      <div class="cart-item-img"><img src="${item.product.img}"></div>
      <div class="cart-item-details">
        <h4>${item.product.title}</h4>
        <div class="price">${item.product.price.toFixed(2)}€</div>
        <div class="cart-qty">
          <button class="qty-btn" onclick="updateQty(${item.product.id},-1)">-</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="updateQty(${item.product.id},1)">+</button>
        </div>
      </div>
      <button class="cart-item-remove" onclick="removeFromCart(${item.product.id})">×</button>
    `;
    body.appendChild(d);
  });
  document.getElementById('cartTotal').textContent = total.toFixed(2) + "€";
}

function checkout(){
  if(cart.length === 0) return;
  var total = cart.reduce((acc,i)=>acc+(i.product.price*i.qty),0);
  var text = `🛍️ *Nuevo Pedido - Soraya Perfumes*\n\n`;
  cart.forEach(i=>{ text += `• ${i.qty}x ${i.product.title} (${i.product.size}) - ${(i.product.price*i.qty).toFixed(2)}€\n`; });
  text += `\n💰 *Total del Pedido:* ${total.toFixed(2)}€\n`;
  text += `⚙️ _Por favor, indícame tu dirección de envío para completar el pedido._`;
  
  var wUrl = "https://wa.me/" + settings.tel.replace(/[^0-9]/g, "") + "?text=" + encodeURIComponent(text);
  window.open(wUrl, '_blank');
}

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

// INIT CENTRALIZADO
renderGrid('homeGrid',null,8);
updateBadge();
if(settings.tel) document.getElementById('cTel').textContent=settings.tel;
if(settings.email) document.getElementById('cEmail').textContent=settings.email;
if(settings.dir) document.getElementById('cDir').textContent=settings.dir;
if(settings.horario) document.getElementById('cHorario').textContent=settings.horario;
if(settings.bizum) document.getElementById('bizumNum').textContent=settings.bizum;
if(settings.iban) document.getElementById('bankIBAN').textContent=settings.iban;
if(settings.titular) document.getElementById('bankTitular').textContent=settings.titular;
</script>

<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h3>Tu Carrito</h3>
    <button class="cart-close" onclick="closeCart()">×</button>
  </div>
  <div class="cart-body" id="cartBody"></div>
  <div class="cart-footer">
    <div class="cart-total"><span>Subtotal:</span><strong id="cartTotal">0.00€</strong></div>
    <div class="cart-pay-info">El pedido se enviará directamente al WhatsApp de la tienda para coordinar el pago por Bizum o Banco de forma humana.</div>
    <button class="btn-checkout" onclick="checkout()">Realizar Pedido por WhatsApp</button>
  </div>
</div>
